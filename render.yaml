services:
  - type: web
    name: ivan-api-generator
    env: python
    # 這裡才是關鍵！添加安裝 ODBC 驅動的命令
    buildCommand: |
      # 更新 apt 套件列表
      sudo apt-get update -y
      # 安裝 unixODBC-dev，這是 pyodbc 的依賴，也是 ODBC 驅動管理器
      sudo apt-get install -y unixodbc-dev
      
      # 以下步驟用於安裝 Microsoft SQL Server ODBC Driver 18
      # 這是從 Microsoft 官方文件：https://learn.microsoft.com/zh-tw/sql/connect/odbc/linux-mac/install-odbc-driver-linux?view=sql-server-ver16#ubuntu 獲取
      # 並針對 Render 的可能環境進行調整
      
      # 匯入 Microsoft GPG 金鑰 (用於驗證套件)
      # 注意：gpg --dearmor > /etc/apt/trusted.gpg.d/microsoft.gpg 是較新 Ubuntu 推薦的方式
      curl https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor > /etc/apt/trusted.gpg.d/microsoft.gpg
      
      # 添加 Microsoft SQL Server 套件儲存庫
      # Render 預設使用 Ubuntu 22.04 (Jammy Jellyfish)。
      # 如果部署時出現錯誤，可以嘗試將 'jammy' 替換為 'focal' (Ubuntu 20.04)
      echo "deb [arch=amd64,signed-by=/etc/apt/trusted.gpg.d/microsoft.gpg] https://packages.microsoft.com/ubuntu/22.04/prod jammy main" | sudo tee /etc/apt/sources.list.d/mssql-release.list
      
      # 再次更新套件列表以包含新的儲存庫
      sudo apt-get update -y
      
      # 安裝 ODBC Driver 18 for SQL Server (接受 EULA)
      ACCEPT_EULA=Y sudo apt-get install -y msodbcsql18
      
      # 安裝 Python 依賴
      pip install -r requirements.txt
    
    # 確保這裡使用 $PORT，這是 Render 推薦的做法
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.10 # 您也可以考慮使用更高的 Python 版本，例如 3.9, 3.10 或 3.11
